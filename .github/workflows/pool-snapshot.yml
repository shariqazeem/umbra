name: pool-snapshot

# Ingest the pool's on-chain events into a PERMANENT snapshot before the Soroban RPC's event
# retention window (~24h to 7 days, a protocol limit) expires. Wallet recovery must rebuild the
# full Merkle tree to prove a spend, so without this the private-send / unshield / claim flows
# break once the pool ages past retention. Runs every 6 hours (well inside the 24h minimum) and
# commits public/pool-snapshot.mainnet.json only when new leaves appear. The wallet seeds its tree
# from that snapshot plus recent live events (lib/umbra/recovery.ts).

on:
  schedule:
    - cron: "17 */6 * * *" # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: pool-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Build snapshot
        env:
          # Optional: a longer-retention RPC. Defaults to the public mainnet RPC when unset.
          SNAPSHOT_RPC_URL: ${{ secrets.SNAPSHOT_RPC_URL }}
        run: npx --yes tsx scripts/build-snapshot.mts
      - name: Commit if the snapshot changed
        run: |
          if git diff --quiet -- public/pool-snapshot.mainnet.json; then
            echo "snapshot unchanged — nothing to commit"
          else
            git config user.name "umbra-snapshot-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/pool-snapshot.mainnet.json
            git commit -m "chore(snapshot): refresh pool leaf record"
            git push
          fi
